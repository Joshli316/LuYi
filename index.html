<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LuYi 路易 — Free bilingual immigration pathway planner for international students in the US. Discover visa options beyond H-1B, assess eligibility, plan timelines, and avoid scams.">
  <meta name="theme-color" content="#0D9488">
  <meta property="og:title" content="LuYi 路易 — Path Made Easy">
  <meta property="og:description" content="Free bilingual immigration pathway planner for international students in the US.">
  <meta property="og:type" content="website">
  <title>LuYi 路易 — Path Made Easy</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/4"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="print.css" media="print">
  <style>
    :root {
      --primary: #0D9488;
      --primary-light: #CCFBF1;
      --primary-dark: #0F766E;
      --accent: #F59E0B;
      --accent-light: #FEF3C7;
      --bg: #FFFBF5;
      --surface: #FFFFFF;
      --text: #1F2937;
      --text-secondary: #6B7280;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --border: #E5E7EB;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.15);
      --focus-ring: 0 0 0 3px rgba(13,148,136,0.25);
    }

    .dark {
      --bg: #111827;
      --surface: #1F2937;
      --text: #F9FAFB;
      --text-secondary: #9CA3AF;
      --border: #374151;
      --primary-light: #134E4A;
      --accent-light: #78350F;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      transition: background-color 200ms ease, color 200ms ease;
    }

    h1, h2, h3, h4, h5, h6 { line-height: 1.3; color: var(--text); }

    a { color: var(--primary); text-decoration: none; }
    a:hover { color: var(--primary-dark); }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 200ms ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover { background-color: var(--primary-dark); transform: translateY(-1px); }
    .btn-primary:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 16px;
      cursor: pointer;
      transition: all 200ms ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: transform 200ms ease, box-shadow 200ms ease;
      border: 1px solid var(--border);
    }

    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 500;
    }

    .badge-green { background: #D1FAE5; color: #065F46; }
    .badge-amber { background: var(--accent-light); color: #92400E; }
    .badge-red { background: #FEE2E2; color: #991B1B; }

    .dark .badge-green { background: #064E3B; color: #6EE7B7; }
    .dark .badge-amber { background: #78350F; color: #FCD34D; }
    .dark .badge-red { background: #7F1D1D; color: #FCA5A5; }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 9999px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 9999px;
      transition: width 400ms ease;
    }

    .result-card {
      border-left: 4px solid var(--border);
      padding: 20px 24px;
      background: var(--surface);
      border-radius: 0 16px 16px 0;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }
    .result-card.green { border-left-color: var(--success); }
    .result-card.amber { border-left-color: var(--warning); }
    .result-card.red { border-left-color: var(--danger); }

    .disclaimer-bar {
      position: sticky;
      bottom: 0;
      background: var(--accent-light);
      color: #92400E;
      padding: 12px 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 40;
      border-top: 1px solid #FCD34D;
    }
    .dark .disclaimer-bar { color: #FCD34D; border-top-color: #92400E; }
    .disclaimer-bar button {
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      padding: 4px;
      margin-left: auto;
      flex-shrink: 0;
    }

    select, input[type="text"], input[type="number"], input[type="month"] {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 16px;
      background: var(--surface);
      color: var(--text);
      width: 100%;
      transition: border-color 200ms ease;
      font-family: inherit;
    }
    select:focus, input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: var(--focus-ring);
    }

    .fade-in {
      animation: fadeIn 150ms ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .comparison-table thead th {
      background: var(--primary);
      color: white;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .comparison-table tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .comparison-table tbody tr:nth-child(even) {
      background: var(--bg);
    }
    .comparison-table tbody tr:nth-child(odd) {
      background: var(--surface);
    }

    @media (max-width: 768px) {
      .comparison-table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .comparison-table td:first-child,
      .comparison-table th:first-child {
        position: sticky;
        left: 0;
        z-index: 5;
        background: inherit;
      }
      .comparison-table th:first-child {
        z-index: 15;
      }
    }

    .timeline-item {
      position: relative;
      padding-left: 32px;
      padding-bottom: 24px;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 28px;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .timeline-item:last-child::before { display: none; }
    .timeline-dot {
      position: absolute;
      left: 0;
      top: 6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      background: var(--surface);
    }
    .timeline-dot.urgent { border-color: var(--danger); background: #FEE2E2; }
    .timeline-dot.done { border-color: var(--success); background: #D1FAE5; }

    .checkbox-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
    }
    .checkbox-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }

    .tool-nav { display: none; }
    @media (max-width: 768px) {
      .tool-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        z-index: 50;
        padding: 8px 4px;
        justify-content: space-around;
        gap: 2px;
      }
      .tool-nav a {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 10px;
        color: var(--text-secondary);
        text-decoration: none;
        padding: 4px;
        border-radius: 8px;
        min-width: 0;
        flex: 1;
      }
      .tool-nav a.active { color: var(--primary); }
      body { padding-bottom: 72px; }
      .disclaimer-bar { bottom: 72px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-skeleton" style="max-width:960px;margin:0 auto;padding:60px 20px;text-align:center">
      <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;margin:0 auto 16px;animation:spin 800ms linear infinite"></div>
      <div style="font-size:18px;font-weight:600;color:var(--text)">Loading LuYi...</div>
    </div>
    <style>#loading-skeleton{opacity:1;transition:opacity 200ms}@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
