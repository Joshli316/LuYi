name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: node build.js
      - name: Verify dist output
        run: |
          test -f dist/app.js || (echo "dist/app.js missing" && exit 1)
          echo "Build output OK: $(wc -c < dist/app.js) bytes"
